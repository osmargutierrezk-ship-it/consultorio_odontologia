services:
  - type: web
    name: lumiplus-fullstack
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: VITE_API_URL
        value: ""
      - key: VITE_GOOGLE_MAPS_KEY
        sync: false
